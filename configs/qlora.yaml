model:
  name: liuhaotian/llava-v1.5-7b
  max_seq_length: 2048

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: nf4

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  epochs: 3
  logging_steps: 10
  output_dir: models/qlora